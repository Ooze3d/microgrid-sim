device:
  name: pm_grid_1
  type: power_meter
  bind: 0.0.0.0
  port: 502
  intended_ip: 192.168.52.34
  unit_id: 255
  notes: "PM grid meter. PLC-facing map, using the addresses from the current project."

encoding:
  byteorder: big
  wordorder: big

registers:
  - name: energy_in
    address: 2699
    type: float32
    value: 12500.0
    description: "Wh or kWh depending on current PLC interpretation"

  - name: energy_out
    address: 2701
    type: float32
    value: 250.0

  - name: current_i1
    address: 2999
    type: float32
    value: 173.2

  - name: current_i2
    address: 3001
    type: float32
    value: 171.8

  - name: current_i3
    address: 3003
    type: float32
    value: 169.9

  - name: voltage_v12
    address: 3019
    type: float32
    value: 400.5

  - name: voltage_v23
    address: 3021
    type: float32
    value: 399.7

  - name: voltage_v31
    address: 3023
    type: float32
    value: 401.1

  - name: active_power
    address: 3059
    type: float32
    value: 120000.0

  - name: reactive_power
    address: 3067
    type: float32
    value: 18000.0

  - name: apparent_power
    address: 3075
    type: float32
    value: 121500.0

  - name: frequency
    address: 3109
    type: float32
    value: 50.0
